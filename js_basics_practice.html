<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript 基础练习</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #16213e;
      padding: 14px 20px;
      border-bottom: 1px solid #0f3460;
      text-align: center;
      flex-shrink: 0;
    }
    .header h1 { color: #00d4ff; font-size: 1.1em; }
    .header p  { color: #6272a4; font-size: 0.72em; margin-top: 3px; }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 18px 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 680px;
      margin: 0 auto;
      width: 100%;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .chat::-webkit-scrollbar { display: none; }

    .msg { display: flex; align-items: flex-start; gap: 9px; max-width: 82%; }
    .msg.ai   { align-self: flex-start; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .avatar.ai   { background: #00d4ff; color: #1a1a2e; }
    .avatar.user { background: #e94560; color: #fff; }

    .bubble {
      padding: 10px 14px;
      border-radius: 13px;
      font-size: 13.5px;
      line-height: 1.85;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble.ai   { background: #16213e; border-top-left-radius: 3px; }
    .bubble.user { background: #e94560; border-top-right-radius: 3px; }

    .kw   { color: #ff79c6; }
    .fn   { color: #50fa7b; }
    .str  { color: #f1fa8c; }
    .num  { color: #bd93f9; }
    .com  { color: #6272a4; font-style: italic; }
    .op   { color: #ff79c6; }
    .bool { color: #bd93f9; }
    .res  { color: #00d4ff; }

    .quiz-panel {
      background: #0f3460;
      border-radius: 9px;
      padding: 12px 16px;
      margin: 3px 0;
      font-size: 13px;
      line-height: 2;
    }
    .quiz-panel .q-label { color: #00d4ff; font-weight: bold; margin-bottom: 3px; font-size: 12px; }

    .action-row {
      display: flex; gap: 8px; margin-top: 9px; flex-wrap: wrap;
    }
    .action-btn {
      padding: 5px 15px;
      border-radius: 15px;
      border: none;
      cursor: pointer;
      font-size: 12.5px;
      font-weight: bold;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .action-btn.skip {
      background: #2a2a4a; color: #a0a0c0; border: 1px solid #4a4a6a;
    }
    .action-btn.skip:hover {
      background: #3a3a5a; transform: translateY(-1px);
    }
    .action-btn.retry {
      background: linear-gradient(135deg, #ff9800, #e65100);
      color: #fff;
    }
    .action-btn.retry:hover {
      transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,152,0,0.4);
    }

    .input-area {
      background: #16213e;
      border-top: 1px solid #0f3460;
      padding: 12px 14px;
      display: flex; gap: 8px; align-items: center;
      max-width: 680px; margin: 0 auto; width: 100%;
      flex-shrink: 0;
    }
    .input-area input {
      flex: 1;
      background: #0f3460;
      border: 1px solid #0f3460;
      border-radius: 22px;
      padding: 10px 16px;
      color: #fff;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-area input:focus { border-color: #00d4ff; }
    .input-area input::placeholder { color: #6272a4; }

    .send-btn {
      background: linear-gradient(135deg, #00d4ff, #007bb5);
      color: #fff; border: none;
      padding: 9px 20px; border-radius: 22px;
      cursor: pointer; font-size: 13px; font-weight: bold;
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
    }
    .send-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,212,255,0.35); }

    .progress {
      display: flex; gap: 5px; justify-content: center;
      padding: 7px 0 3px; flex-shrink: 0;
    }
    .progress-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #0f3460;
      transition: background 0.3s;
    }
    .progress-dot.done   { background: #50fa7b; }
    .progress-dot.active { background: #00d4ff; }
  </style>
</head>
<body>

<div class="header">
  <h1>JavaScript 基础练习</h1>
  <p>共 5 个章节 · AI 提问，你来回答 · 可跳过</p>
</div>

<div class="progress" id="progress"></div>

<div class="chat" id="chat"></div>

<div class="input-area">
  <input type="text" id="userInput" placeholder="输入答案后按回车发送..." autocomplete="off" />
  <button class="send-btn" id="sendBtn">发送</button>
</div>

<script>
var CHAPTERS = [
  {
    title: '第一章：变量定义',
    intro: '这一章我们来学习 var、let、const 三种变量声明方式的区别。',
    questions: [
      {
        q: 'JavaScript 有几种声明变量的方式？分别是什么？',
        hint: '提示：三种关键字，分别是 var、let 和 const',
        answer: ['const', 'var', 'let'],
        multi: true,
        split: '[，,、\\s]+'
      },
      {
        q: '用 const 声明的变量能被重新赋值吗？',
        hint: '提示：const 是 constant（常量）的缩写',
        answer: ['不能', '不可以', '不行', '否', 'no', 'false'],
        exact: false
      },
      {
        q: '下面代码会输出什么？\n\nvar x = 10;\nvar x = 100;\nconsole.log(x);',
        answer: ['100'],
        exact: false
      },
      {
        q: '下面代码会报错吗？\n\nlet y = 20;\nlet y = 200;',
        hint: '提示：let 是块级作用域，不能重复声明',
        answer: ['会', '是', '报错', 'yes', 'true', '会的', '是的'],
        exact: false
      },
      {
        q: '开发中建议优先使用哪两个关键字？\n（按顺序，如：const、let）',
        answer: ['const', 'let', 'const、let', 'const，let', 'const, let'],
        multi: true,
        split: '[，,、\\s]+'
      }
    ]
  },
  {
    title: '第二章：变量类型',
    intro: '这一章我们来看看 JavaScript 的数据类型，以及 typeof 和类型转换。',
    questions: [
      {
        q: 'JavaScript 基本类型中，表示"无"的关键字是哪两个？',
        hint: '提示：一个是 null，一个是 undefined',
        answer: ['null', 'undefined'],
        multi: true,
        split: '[，,、\\s]+'
      },
      {
        q: 'typeof null 返回什么？（这是一个历史 bug）',
        answer: ['object', '"object"', "'object'"],
        exact: false
      },
      {
        q: '"55" + 5 的结果是什么？（请写出字符串形式）',
        answer: ['555', '"555"', "'555'"],
        exact: false
      },
      {
        q: '将字符串 "123" 转换成数字 123，该用什么函数？',
        hint: '提示：不是 parseInt，是 Number',
        answer: ['number', 'Number', 'number()', 'Number()'],
        exact: false
      },
      {
        q: '数组在 typeof 检测下返回什么类型？函数呢？\n（用顿号分隔，如：number、string）',
        answer: ['object', 'function', 'object、function', 'object，function'],
        multi: true,
        split: '[，,、\\s]+'
      }
    ]
  },
  {
    title: '第三章：表达式',
    intro: '这一章我们来学习算术、比较、逻辑表达式，以及三元表达式。',
    questions: [
      {
        q: '10 == "10" 和 10 === "10" 分别返回什么？\n（用逗号分隔，如：true, false）',
        answer: ['true', 'false', 'true，false', 'true, false'],
        multi: true,
        split: '[，,、\\s]+'
      },
      {
        q: '!true（非 true）的结果是什么？',
        answer: ['false'],
        exact: false
      },
      {
        q: '"hi" || "hello" 的结果是什么？',
        hint: '提示：|| 遇到真值就返回，左边为真直接返回 "hi"',
        answer: ['hi', '"hi"', "'hi'"],
        exact: false
      },
      {
        q: '三元表达式  age >= 18 ? "成年" : "未成年"  中，? 前面叫什么？',
        hint: '提示：也叫条件表达式',
        answer: ['条件', 'condition', '条件表达式', '比较表达式', '判断'],
        exact: false
      },
      {
        q: '2 ** 3 等于多少？（2的3次方）',
        answer: ['8'],
        exact: false
      }
    ]
  },
  {
    title: '第四章：流程控制',
    intro: '这一章我们学习分支和循环结构，包括 if-else、switch、for、while 等。',
    questions: [
      {
        q: 'for...of 用来遍历什么？for...in 用来遍历什么？\n（用顿号分隔，如：数组、对象）',
        answer: ['数组', '对象', '值', '键', '数组，对象', '数组、对象'],
        multi: true,
        split: '[，,、\\s]+'
      },
      {
        q: '在循环中，break 的作用是什么？continue 呢？',
        hint: '提示：break 跳出整个循环，continue 跳过本次迭代',
        answer: ['跳出', '停止', '结束', '跳过', '跳出循环', '停止循环', '跳过本次'],
        exact: false
      },
      {
        q: 'do...while 和 while 的主要区别是什么？',
        hint: '提示：do...while 至少会执行一次',
        answer: ['至少执行一次', '先执行再判断', '先运行一次', '会执行一次'],
        exact: false
      },
      {
        q: '下面代码输出什么？\n\nfor (var i = 1; i <= 3; i++) {\n  if (i === 2) break;\n  console.log(i);\n}',
        hint: '提示：break 在 i===2 时终止整个循环',
        answer: ['1'],
        exact: false
      },
      {
        q: 'switch 语句中每个 case 后面为什么要加 break？',
        hint: '提示：不加 break 会继续执行后面的 case（穿透）',
        answer: ['穿透', '继续执行', '执行下一个', '不加会执行后面', '贯穿'],
        exact: false
      }
    ]
  },
  {
    title: '第五章：函数',
    intro: '最后一章，我们来学习函数的多种写法，包括闭包和数组方法。',
    questions: [
      {
        q: '函数声明和函数表达式的主要区别是什么？',
        hint: '提示：函数声明可以提升，函数表达式不行',
        answer: ['提升', 'hoisting', '可提升', '声明提升', '函数声明可以提升', '能提升'],
        exact: false
      },
      {
        q: '箭头函数有没有自己的 this？',
        hint: '提示：箭头函数不绑定自己的 this，继承外层',
        answer: ['没有', '不', 'no', 'false', '不绑定', '继承外层'],
        exact: false
      },
      {
        q: '下面代码输出什么？\n\nconst add = (a, b) => a + b;\nconsole.log(add(3, 4));',
        answer: ['7'],
        exact: false
      },
      {
        q: '什么是闭包？用自己的话简单描述一下',
        hint: '提示：一个函数能记住并访问外部变量',
        answer: ['函数', '外部', '变量', '记住', '访问', '引用', '作用域'],
        free: true
      },
      {
        q: 'map 和 filter 两个数组方法，哪个返回新数组？\n（可能不止一个，用顿号分隔）',
        hint: '提示：map 和 filter 都返回新数组',
        answer: ['map', 'filter', 'map、filter', 'filter、map', 'map filter', 'map, filter'],
        multi: true,
        split: '[，,、\\s]+'
      }
    ]
  }
];

var currentChapter  = 0;
var currentQuestion  = 0;
var correctCount     = 0;
var isStarted        = false;
var waitingNext      = false;
var retryCount       = 0;
var typingTimer      = null;

var CORRECT_MSGS = [
  '太棒了！🎉 回答正确！',
  '没错！💡 掌握得不错！',
  '完全正确！🌟 继续加油~',
  '嗯，答对了！👍',
  '优秀！💪 下一题继续！'
];

var WRONG_RETRY_MSGS = [
  '哎呀，还差一点，再想想？',
  '不太对哦，别灰心，再试一次！',
  '嗯？这道题有点绕，再想想？',
  '嗯...提示里就有答案，仔细看看？',
  '没关系，再尝试一下，你可以的！',
  '差一点点了！再想想~',
];

var GREET_MSGS = ['好的，我们开始吧~', '好嘞，准备好了吗？', '开始！加油哦~', '好，让我们来看题！'];

var chatEl     = document.getElementById('chat');
var inputEl    = document.getElementById('userInput');
var sendBtnEl  = document.getElementById('sendBtn');
var progressEl = document.getElementById('progress');

function scrollToBottom() {
  chatEl.scrollTo({ top: chatEl.scrollHeight, behavior: 'smooth' });
}

function typing(delay, fn) {
  if (typingTimer) clearTimeout(typingTimer);
  typingTimer = setTimeout(fn, delay);
}

function randomItem(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function addBubble(role, html) {
  var div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML =
    '<div class="avatar ' + role + '">' + (role === 'ai' ? '🤖' : '👤') + '</div>' +
    '<div class="bubble ' + role + '">' + html + '</div>';
  chatEl.appendChild(div);
  scrollToBottom();
  return div;
}

function addAI(html) { return addBubble('ai', html); }
function addUser(html) { return addBubble('user', html); }

function checkAnswer(userAns) {
  var q  = CHAPTERS[currentChapter].questions[currentQuestion];
  var ua = userAns.trim().replace(/[`"'（）()]/g, '');

  if (q.free) {
    var kw = Array.isArray(q.answer) ? q.answer : [q.answer];
    var matched = kw.filter(function(kw) { return ua.indexOf(kw) !== -1; });
    if (matched.length >= 2) return { correct: true };
    return { correct: false, hint: '试着提到「函数」「外部」「变量」等关键词~' };
  }

  if (q.multi) {
    var sep = q.split || '[，,、\\s]+';
    var userParts = ua.split(new RegExp(sep)).filter(Boolean);
    var ansRaw = Array.isArray(q.answer[0]) ? q.answer : q.answer;
    var allParts = [];
    ansRaw.forEach(function(a) {
      a.split(new RegExp(sep)).forEach(function(p) { if (p) allParts.push(p); });
    });
    var found = allParts.filter(function(part) {
      return userParts.some(function(up) {
        return up.toLowerCase().indexOf(part.toLowerCase()) !== -1 ||
               part.toLowerCase().indexOf(up.toLowerCase()) !== -1;
      });
    });
    if (found.length > 0) return { correct: true };
    return { correct: false, hint: '提示：要包含 ' + allParts.join(' 和 ') };
  }

  var answers = Array.isArray(q.answer) ? q.answer : [q.answer];
  for (var i = 0; i < answers.length; i++) {
    var std = answers[i].trim().replace(/[`"'（）()]/g, '');
    if (q.exact) {
      if (ua === std) return { correct: true };
    } else {
      if (ua.indexOf(std.toLowerCase()) !== -1 || std.toLowerCase().indexOf(ua.toLowerCase()) !== -1) {
        return { correct: true };
      }
    }
  }
  return { correct: false, hint: q.hint || '再想想？' };
}

function showIntro() {
  addAI(
    '<b>欢迎来到 JavaScript 基础练习！</b>\n\n' +
    '🤖 我会依次提问，你需要输入答案。\n\n' +
    '📚 <b>练习内容：</b>\n' +
    '① 变量定义（var / let / const）\n' +
    '② 变量类型（typeof / 类型转换）\n' +
    '③ 表达式（算术 / 比较 / 逻辑）\n' +
    '④ 流程控制（if / switch / for / while）\n' +
    '⑤ 函数（声明 / 箭头函数 / 闭包 / 数组方法）\n\n' +
    '📌 <b>说明：</b>\n' +
    '• 答错了我会给提示，可以重试\n' +
    '• 不想答就点「跳过」\n' +
    '• 随时输入"重新开始"重置\n\n' +
    '准备好了吗？输入任意内容开始吧~'
  );
}

function startChapter(chapterIdx) {
  currentChapter  = chapterIdx;
  currentQuestion = 0;
  correctCount    = 0;
  isStarted       = true;
  waitingNext     = false;
  retryCount      = 0;
  renderProgress();

  var ch = CHAPTERS[chapterIdx];
  addAI('<b>' + ch.title + '</b>\n\n' + ch.intro);
  typing(700, function() {
    addAI('准备好了吗？来看第一题~');
    typing(500, askQuestion);
  });
}

function askQuestion() {
  retryCount = 0;
  var ch = CHAPTERS[currentChapter];
  var q  = ch.questions[currentQuestion];

  var html = '<div class="quiz-panel">';
  html += '<div class="q-label">📝 第 ' + (currentQuestion + 1) + ' / ' + ch.questions.length + ' 题</div>';
  html += q.q.replace(/\n/g, '<br>');
  if (q.hint) html += '<br><span class="com">💡 ' + q.hint + '</span>';
  html += '</div>';
  html += '<div class="action-row">';
  html += '<button class="action-btn skip" onclick="window.skipQuestion()">⏭ 跳过</button>';
  html += '</div>';

  addAI(html);
  inputEl.value = '';
  inputEl.focus();
}

function skipQuestion() {
  addAI('好嘞，这题先跳过~');
  typing(600, nextQuestion);
}

function nextQuestion() {
  currentQuestion++;
  var ch = CHAPTERS[currentChapter];
  if (currentQuestion >= ch.questions.length) {
    handleChapterComplete();
  } else {
    askQuestion();
  }
}

function handleChapterComplete() {
  var ch  = CHAPTERS[currentChapter];
  var pct = Math.round((correctCount / ch.questions.length) * 100);
  var emoji = pct >= 80 ? '🌟' : pct >= 50 ? '👍' : '💪';

  addAI(emoji + ' <b>' + ch.title + ' 完成！</b>\n本章正确率：' + pct + '%（' + correctCount + ' / ' + ch.questions.length + '）');

  if (currentChapter < CHAPTERS.length - 1) {
    waitingNext = true;
    typing(600, function() {
      addAI('准备好进入 <b>' + CHAPTERS[currentChapter + 1].title + '</b> 吗？\n输入任意内容继续~');
      inputEl.focus();
    });
  } else {
    waitingNext = true;
    typing(600, function() {
      addAI('🎉 <b>恭喜你完成了所有章节练习！</b>\n\nJS 基础内容全部学完啦~\n如果想重新开始，请输入"重新开始"。');
      inputEl.focus();
    });
  }
}

function sendAnswer() {
  var userAns = inputEl.value.trim();
  if (!userAns) return;

  if (userAns === '重新开始') {
    chatEl.innerHTML = '';
    waitingNext     = false;
    isStarted       = false;
    currentChapter  = 0;
    currentQuestion = 0;
    renderProgress();
    showIntro();
    inputEl.value = '';
    inputEl.focus();
    return;
  }

  if (waitingNext) {
    addUser(userAns);
    waitingNext = false;
    if (currentChapter < CHAPTERS.length - 1) {
      startChapter(currentChapter + 1);
    } else {
      chatEl.innerHTML = '';
      isStarted = false;
      currentChapter = 0;
      currentQuestion = 0;
      renderProgress();
      showIntro();
    }
    return;
  }

  if (!isStarted) {
    addUser(userAns);
    addAI(randomItem(GREET_MSGS));
    typing(400, function() { startChapter(0); });
    return;
  }

  addUser(userAns);

  var result = checkAnswer(userAns);

  if (result.correct) {
    correctCount++;
    addAI(randomItem(CORRECT_MSGS));
    typing(800, nextQuestion);
  } else {
    retryCount++;
    var msg = randomItem(WRONG_RETRY_MSGS);
    if (result.hint) msg += '\n\n💡 ' + result.hint;

    var html = '<div>' + msg + '</div>';
    html += '<div class="action-row">';
    html += '<button class="action-btn retry" onclick="window.retryQuestion()">🔄 再试一次</button>';
    html += '<button class="action-btn skip" onclick="window.skipQuestion()">⏭ 跳过</button>';
    html += '</div>';

    addAI(html);
    inputEl.value = '';
    inputEl.focus();
  }
}

window.skipQuestion = skipQuestion;
window.retryQuestion = function() {
  addAI('好的，再想想~ 输入你的答案吧！');
  inputEl.focus();
};

function renderProgress() {
  progressEl.innerHTML = '';
  for (var c = 0; c < CHAPTERS.length; c++) {
    var dot = document.createElement('div');
    dot.className = 'progress-dot';
    if (c < currentChapter) dot.classList.add('done');
    else if (c === currentChapter) dot.classList.add('active');
    progressEl.appendChild(dot);
  }
}

sendBtnEl.onclick = sendAnswer;
inputEl.onkeydown = function(e) {
  if (e.key === 'Enter') sendAnswer();
};

renderProgress();
showIntro();
inputEl.focus();
</script>

</body>
</html>
